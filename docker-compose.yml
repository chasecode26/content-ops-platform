version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: content_ops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_ops
    ports:
      - "5432:5432"
    volumes:
      - content_ops_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: content_ops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - content_ops_redisdata:/data

volumes:
  content_ops_pgdata:
  content_ops_redisdata:
